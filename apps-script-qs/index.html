<!-- QS Decox – Hệ thống bóc tách & báo giá -->
<style>
  :root{
    --brand:#b3925e; --brand-600:#8f7345; --brand-050:#f7f2ea; --brand-100:#ece0cd;
    --hero1:#8f6f42; --hero2:#b3925e; --hero3:#c9ab7d;
    --bg:#f6f7f9; --card:#ffffff; --line:#edeff3; --line2:#e4e7ee;
    --ink:#1b2130; --ink2:#3a4256; --muted:#8b93a7; --soft:#fafbfc;
    --green:#16a34a; --green050:#e9f8ef; --amber:#e08a1e; --amber050:#fdf3e3;
    --danger:#ef4444; --blue:#3b82f6;
  }
  *{box-sizing:border-box;font-family:'Inter','Segoe UI',system-ui,Arial,sans-serif}
  body{margin:0;background:var(--bg);color:var(--ink);font-size:13.5px;-webkit-font-smoothing:antialiased}
  .app{display:flex;min-height:100vh}
  a{color:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#d8dce4;border-radius:8px;border:2px solid transparent;background-clip:content-box}

  /* ===== SIDEBAR ===== */
  .side{width:238px;background:var(--card);border-right:1px solid var(--line);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:11px;padding:18px 18px 16px}
  .brand .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--hero1),var(--hero2));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;box-shadow:0 4px 12px rgba(179,146,94,.35)}
  .brand b{color:var(--ink);font-size:15px;display:block;line-height:1.1}
  .brand small{color:var(--muted);font-size:11px}
  .nav-sec{padding:14px 20px 6px;font-size:10.5px;font-weight:700;letter-spacing:.7px;color:#a8afbf;text-transform:uppercase}
  .nav{padding:4px 12px;display:flex;flex-direction:column;gap:2px;flex:1;overflow:auto}
  .nav button{display:flex;align-items:center;gap:11px;background:none;border:0;color:var(--ink2);text-align:left;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;width:100%;font-weight:500}
  .nav button .ic{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:#7b8497}
  .nav button .ic svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .nav button:hover{background:#f4f5f8}
  .nav button.on{background:var(--brand-050);color:var(--brand-600);font-weight:600}
  .nav button.on .ic{color:var(--brand-600)}
  .side-foot{margin:10px 12px 14px;padding:12px 14px;background:var(--soft);border:1px solid var(--line);border-radius:12px;font-size:11.5px;color:var(--muted)}
  .side-foot b{color:var(--ink);display:block;font-size:13px;margin:3px 0}
  .prog{height:6px;background:#e9ebf1;border-radius:4px;margin-top:6px;overflow:hidden}
  .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--hero1),var(--hero2))}

  /* ===== CONTENT ===== */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:11px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:30}
  .crumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
  .crumb b{color:var(--ink);font-weight:600}
  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--amber050);color:var(--amber);text-transform:uppercase;letter-spacing:.3px}
  .badge.done{background:var(--green050);color:var(--green)}
  .spacer{flex:1}
  .pjsel{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .page{padding:20px 22px}

  /* ===== HERO ===== */
  .hero{margin:20px 22px 0;border-radius:20px;padding:26px 30px;color:#fff;position:relative;overflow:hidden;
    background:linear-gradient(115deg,var(--hero1) 0%,var(--hero2) 52%,var(--hero3) 100%)}
  .hero:after{content:"";position:absolute;right:-60px;top:-60px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.12)}
  .hero:before{content:"";position:absolute;right:80px;bottom:-90px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08)}
  .hero .eyebrow{font-size:11px;letter-spacing:1.4px;font-weight:700;opacity:.9;text-transform:uppercase;position:relative}
  .hero h1{margin:7px 0 13px;font-size:29px;font-weight:800;letter-spacing:-.5px;position:relative}
  .hpills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;position:relative}
  .hpill{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.28);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .hmeta{display:flex;gap:22px;flex-wrap:wrap;font-size:12.5px;opacity:.92;position:relative}
  .hmeta span b{font-weight:700}
  .hprog-wrap{margin-top:16px;position:relative;max-width:640px}
  .hprog-top{display:flex;justify-content:space-between;font-size:11.5px;font-weight:600;opacity:.95;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
  .hprog{height:7px;background:rgba(255,255,255,.28);border-radius:6px;overflow:hidden}
  .hprog>i{display:block;height:100%;background:#fff;border-radius:6px}

  /* form controls */
  select,input,textarea{background:#fff;border:1px solid var(--line2);color:var(--ink);border-radius:9px;padding:9px 11px;font-size:13px;outline:none;font-family:inherit}
  select:focus,input:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(179,146,94,.14)}
  .btn{background:var(--brand);border:0;color:#fff;padding:9px 15px;border-radius:10px;cursor:pointer;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 6px rgba(179,146,94,.28)}
  .btn:hover{filter:brightness(1.05)}
  .btn.green{background:var(--green);box-shadow:0 2px 6px rgba(22,163,74,.25)}
  .btn.ghost{background:#fff;border:1px solid var(--line2);color:var(--ink2);box-shadow:none}
  .btn.red{background:var(--danger);box-shadow:0 2px 6px rgba(239,68,68,.25)}
  .btn.sm{padding:6px 12px;font-size:12px;border-radius:9px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(16,24,40,.04)}
  .card h3{margin:0 0 15px;font-size:15.5px;font-weight:700}
  .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}}

  /* stat cards */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
  @media(max-width:1100px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 1px 3px rgba(16,24,40,.04)}
  .stat .lbl{color:var(--muted);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .stat .val{font-size:27px;font-weight:800;margin:7px 0 2px;letter-spacing:-.5px}
  .stat .sub{color:var(--muted);font-size:11.5px}
  .stat.blue .val{color:var(--brand-600)} .stat.green .val{color:var(--green)}
  .stat.amber .val{color:var(--amber)} .stat.navy .val{color:var(--ink)}

  /* tables */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
  th,td{border-bottom:1px solid var(--line);padding:11px 14px;text-align:left;vertical-align:middle}
  th{background:var(--soft);font-weight:600;color:#6b7385;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  tbody tr:last-child td{border-bottom:0}
  td.num,th.num{text-align:right;white-space:nowrap}
  tbody tr:hover{background:#faf7f2}
  td input,td select{padding:6px 8px;border-radius:7px}
  td input.qty{width:74px;text-align:right}
  td input.price{width:110px;text-align:right}
  td input.pct{width:64px;text-align:right}
  td input.txt{width:100%;min-width:120px}
  .thumb{width:44px;height:44px;object-fit:cover;border-radius:9px;background:#f1f2f6;border:1px solid var(--line)}
  .row-del{color:var(--danger);cursor:pointer;font-weight:700;font-size:15px}
  .pill{background:#f1f2f6;border:1px solid var(--line);border-radius:20px;padding:3px 11px;font-size:11px;color:#5a6274;display:inline-block;font-weight:500}
  .tag{background:var(--brand-050);color:var(--brand-600);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600}
  .empty{color:var(--muted);padding:36px;text-align:center}
  .loading{color:var(--muted);padding:16px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .field input,.field textarea,.field select{width:100%}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* chips (bật/tắt cột) */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:#f1f2f6;border:1px solid var(--line2);color:#5a6274;padding:7px 13px;border-radius:20px;cursor:pointer;font-size:12px;user-select:none;font-weight:600}
  .chip.on{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 2px 6px rgba(179,146,94,.28)}

  /* dashboard bars */
  .bar-row{display:grid;grid-template-columns:160px 1fr 120px;gap:12px;align-items:center;padding:8px 0}
  .bar-row .nm{font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar{height:24px;background:#f1f2f6;border-radius:8px;overflow:hidden;position:relative}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--hero1),var(--hero2));border-radius:8px}

  /* search box */
  .searchbox{position:relative;flex:1;max-width:360px}
  .searchbox input{width:100%;padding-left:34px}
  .searchbox .mag{position:absolute;left:11px;top:9px;color:var(--muted)}
  .quick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .quick .q{background:#fff;border:1px solid var(--line2);border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--brand-600)}
  .quick .q:hover{background:var(--brand-050)}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(27,33,48,.42);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:60}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:18px;padding:24px;width:470px;max-width:94vw;max-height:92vh;overflow:auto;box-shadow:0 24px 60px rgba(16,24,40,.24)}
  .modal h3{margin:0 0 16px}
  .modal-act{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
  .toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;display:none;z-index:80;box-shadow:0 12px 32px rgba(0,0,0,.28);font-weight:500}
  .totbar{display:flex;gap:26px;flex-wrap:wrap;align-items:center;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .totbar .t{text-align:right}
  .totbar .t .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  .totbar .t .v{font-size:18px;font-weight:800}
  .totbar .grand .v{font-size:23px;color:var(--green)}
</style>

      <button data-p="baogia" onclick="go('baogia')"><span class="ic"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg></span> Xuất báo giá</button>
    </nav>
    <div class="side-foot">
      Dự án hiện tại:

<script>
/*** ================= STATE + API ================= ***/
var S = { projects:[], products:[], cur:null, lines:[], cols:{}, linesByDA:{} };

function api(fn){
  var args = Array.prototype.slice.call(arguments,1);
  return new Promise(function(res,rej){
    google.script.run.withSuccessHandler(res).withFailureHandler(rej)[fn].apply(google.script.run,args);
  });
}
// ==== Cache lines theo dự án: đọc sheet 1 lần, dùng lại nhiều tab ====
function setLines(maDA, lines){ S.linesByDA[maDA]=lines||[]; if(S.cur&&S.cur.maDA===maDA) S.lines=S.linesByDA[maDA]; }
async function getLinesCached(maDA){
  if(S.linesByDA[maDA]) return S.linesByDA[maDA];
  var l = await api('getLines', maDA) || [];
  setLines(maDA, l); return l;
}
// ==== Tính toán tại trình duyệt (không gọi server) ====
function computeDashboard(lines){
  var von=0,ban=0,kl=0,groups={};
  lines.forEach(function(l){
    von+=l.thanhTienVon; ban+=l.thanhTienBan; kl+=l.soLuong;
    var k=l.nhom||'Khác';
    if(!groups[k]) groups[k]={nhom:k,von:0,ban:0,count:0};
    groups[k].von+=l.thanhTienVon; groups[k].ban+=l.thanhTienBan; groups[k].count++;
  });
  var byGroup=Object.keys(groups).map(function(k){return groups[k];}).sort(function(a,b){return b.ban-a.ban;});
  var ln=ban-von;
  return { tongHangMuc:lines.length, tongKhoiLuong:kl, giaTriVon:von, tongGiaBan:ban,
    loiNhuan:ln, bienLN:ban>0?ln/ban*100:0, byGroup:byGroup };
}
function computeQuote(lines, project){
  var sub=0; lines.forEach(function(l){sub+=l.thanhTienBan;});
  var vatPct=project?(Number(project.vat)||0):0;
  var vat=Math.round(sub*vatPct/100);
  return { project:project, lines:lines, subtotal:sub, vatPct:vatPct, vat:vat, total:sub+vat };
}
function fmt(n){ return (Math.round(Number(n)||0)).toLocaleString('vi-VN'); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(function(){t.style.display='none';},2500); }
function driveThumb(link){ if(!link) return ''; var m=String(link).match(/[-\w]{25,}/); return m?'https://drive.google.com/thumbnail?id='+m[0]+'&sz=w120':''; }
function saveCur(){ try{ localStorage.setItem('qs_cur', S.cur?S.cur.maDA:''); }catch(e){} }
function loadCur(){ try{ return localStorage.getItem('qs_cur')||''; }catch(e){ return ''; } }

/*** ================= COLUMN DEFS ================= ***/
var QCOLS = [
  {key:'stt',label:'STT',def:true},
  {key:'maSP',label:'Mã',def:true},
  {key:'nhom',label:'Nhóm',def:true},
  {key:'ten',label:'Tên hạng mục',def:true},
  {key:'thuongHieu',label:'Thương hiệu',def:false},
  {key:'moTa',label:'Mô tả',def:false},
  {key:'kichThuoc',label:'Kích thước',def:false},
  {key:'hinhAnh',label:'Hình ảnh',def:false},
  {key:'dvt',label:'ĐVT',def:true},
  {key:'soLuong',label:'Số lượng',def:true,num:true},
  {key:'donGiaBan',label:'Đơn giá',def:true,num:true},
  {key:'thanhTienBan',label:'Thành tiền',def:true,num:true}
];

/*** ================= INIT ================= ***/
window.onload = async function(){
  QCOLS.forEach(function(c){ S.cols[c.key]=c.def; });
  go('project');
  try{
    var want = loadCur();
    var boot = await api('bootstrap', want);   // 1 vòng gọi duy nhất
    S.projects = boot.projects||[];
    S.products = boot.products||[];
    S.cur = S.projects.filter(function(p){return p.maDA===want;})[0] || S.projects[0] || null;
    if(S.cur) setLines(S.cur.maDA, boot.lines||[]);
    refreshTop();
    render();
  }catch(e){ document.getElementById('page').innerHTML='<div class="card"><div class="empty" style="color:#c0392b">⚠ Lỗi khởi động: '+esc(e&&e.message)+'</div></div>'; }
};

/*** ================= ROUTER ================= ***/
var PAGE='project';
function go(p){
  PAGE=p;
  document.querySelectorAll('.nav button').forEach(function(b){ b.classList.toggle('on', b.dataset.p===p); });
  render();
}
async function render(){

    +(S.lines.length? '<div class="tbl-wrap"><table style="min-width:900px"><thead><tr><th>STT</th><th>Mã</th><th>Nhóm</th><th>Hạng mục</th><th>ĐVT</th><th class="num">SL</th><th class="num">Đơn giá vốn</th><th class="num">% LN</th><th class="num">Đơn giá bán</th><th class="num">T.tiền vốn</th><th class="num">T.tiền bán</th></tr></thead><tbody>'+rows+'</tbody></table></div>'

async function exportFile(fmt, btn){
  if(!S.cur){ toast('Chưa chọn dự án'); return; }
  var cols = QCOLS.filter(function(c){return S.cols[c.key];}).map(function(c){return {key:c.key,label:c.label,num:!!c.num};});
  if(!cols.length){ toast('Bật ít nhất 1 cột'); return; }
  var old=btn.textContent; btn.disabled=true; btn.textContent='Đang xuất…';
  try{
    var res = await api('exportBaoGia', S.cur.maDA, cols, fmt);
    downloadBlob(res); toast('Đã xuất '+fmt.toUpperCase());
  }catch(e){ toast('Lỗi xuất: '+(e&&e.message||'cần cấp thêm quyền')); }
  btn.disabled=false; btn.textContent=old;
}
function downloadBlob(res){
  var bin=atob(res.base64), bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  var blob=new Blob([bytes],{type:res.mimeType});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=res.name; document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); },1500);
}
function renderQuoteTable(){
  var q=S.quote, el=document.getElementById('quoteCard');
  if(!q.lines.length){ el.innerHTML='<div class="empty">Chưa có hạng mục.</div>'; return; }
  var cols=QCOLS.filter(function(c){return S.cols[c.key];});
  var head=cols.map(function(c){return '<th class="'+(c.num?'num':'')+'">'+c.label+'</th>';}).join('');
  var body=q.lines.map(function(l,i){
    return '<tr>'+cols.map(function(c){
      if(c.key==='stt') return '<td class="num">'+(i+1)+'</td>';
      if(c.key==='thanhTienBan') return '<td class="num"><b>'+fmt(l.thanhTienBan)+'</b></td>';
      if(c.key==='donGiaBan') return '<td class="num">'+fmt(l.donGiaBan)+'</td>';
      if(c.key==='soLuong') return '<td class="num">'+fmt(l.soLuong)+'</td>';
      if(c.key==='hinhAnh'){ var img=driveThumb(l.hinhAnh); return '<td>'+(img?'<img class="thumb" src="'+img+'">':'')+'</td>'; }
      return '<td class="'+(c.num?'num':'')+'">'+esc(l[c.key])+'</td>';
    }).join('')+'</tr>';
  }).join('');
  el.innerHTML='<div style="display:flex;align-items:center;margin-bottom:12px"><h3 style="margin:0">Báo giá — '+esc(q.project?q.project.ten:'')+'</h3></div>'
    +'<div class="tbl-wrap"><table><thead><tr>'+head+'</tr></thead><tbody>'+body+'</tbody></table></div>'
    +'<div class="totbar">'
      +'<div class="t"><div class="k">Tạm tính</div><div class="v">'+fmt(q.subtotal)+' đ</div></div>'
      +'<div class="t"><div class="k">VAT '+q.vatPct+'%</div><div class="v">'+fmt(q.vat)+' đ</div></div>'
      +'<div class="t grand"><div class="k">Tổng cộng</div><div class="v">'+fmt(q.total)+' đ</div></div>'
    +'</div>';
}
</script>
